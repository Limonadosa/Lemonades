<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Dashboard Neon App</title>
    <style>
        /* Variáveis de cores tom sobre tom - Verde Neon e Cyberpunk Dark */
        :root {
            --bg-darkest: #040d06;       /* Fundo profundo do celular */
            --bg-app-container: #0b1a0e; /* Fundo da tela do app */
            --green-dim: #13321b;        /* Verde escuro para bordas/detalhes */
            --green-glow: #00ff66;       /* O verde neon brilhante clássico */
            --green-text: #adffd1;       /* Texto verde claro suave de alta leitura */
            --card-bg: #092211;          /* Fundo dos botões (tom sobre tom) */
            --card-hover: #143d1f;       /* Fundo do botão ao passar o mouse */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-darkest);
            color: var(--green-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Container simulando a proporção e visual de uma tela de celular */
        .phone-wrapper {
            width: 100%;
            max-width: 410px;
            background-color: var(--bg-app-container);
            border: 2px solid var(--green-dim);
            border-radius: 32px;
            padding: 25px 20px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.05), inset 0 0 15px rgba(0, 255, 102, 0.02);
            display: flex;
            flex-direction: column;
            min-height: 780px;
        }

        /* Barra de status fictícia superior do celular */
        .phone-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: rgba(173, 255, 209, 0.4);
            margin-bottom: 25px;
            padding: 0 5px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .status-icons {
            display: flex;
            gap: 6px;
        }

        /* Cabeçalho do Dashboard */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--green-glow);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        header p {
            font-size: 0.85rem;
            color: rgba(173, 255, 209, 0.6);
        }

        /* Grade de Aplicativos / Botões Clicáveis */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 colunas de apps igual celular */
            gap: 16px;
            flex-grow: 1;
            align-content: start;
        }

        /* Estilo de cada botão "App" */
        .app-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--green-text);
            transition: all 0.2s ease;
        }

        /* O ícone quadrado do app (Tom sobre tom com brilho neon) */
        .app-icon {
            width: 68px;
            height: 68px;
            background-color: var(--card-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Nome do aplicativo abaixo do ícone */
        .app-label {
            font-size: 0.78rem;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            color: rgba(173, 255, 209, 0.85);
        }

        /* Efeitos de Hover e Toque (Feedback visual do botão) */
        .app-button:hover .app-icon {
            background-color: var(--card-hover);
            border-color: var(--green-glow);
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.25);
        }

        .app-button:active .app-icon {
            transform: scale(0.95);
        }

        /* Rodapé / Barra inferior de navegação do celular */
        .phone-nav-bar {
            margin-top: auto;
            display: flex;
            justify-content: center;
            padding-top: 20px;
        }

        .home-indicator {
            width: 120px;
            height: 4px;
            background-color: rgba(0, 255, 102, 0.2);
            border-radius: 2px;
        }
    </style>
</head>
