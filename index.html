<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Pessoal</title>

<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#39ff14;
    --primary-soft:#7fff4d;
    --card:rgba(0,0,0,.65);
    --bg:#050505;
    --text:#e8ffe1;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    padding:12px;
    font-family:Audiowide,sans-serif;
    color:var(--text);

    background:
        linear-gradient(
            rgba(0,0,0,.55),
            rgba(0,0,0,.75)
        ),
        url("lemon.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

header{
    text-align:center;
    max-width:900px;
    margin:20px auto;
}

h1{
    color:var(--primary);
    margin-bottom:25px;
    text-shadow:
        0 0 10px var(--primary),
        0 0 20px var(--primary);
}

/* Pesquisa Google */
#google-search{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border-radius:12px;
    border:1px solid var(--primary);
    background:var(--card);
    color:var(--text);
    backdrop-filter:blur(8px);
    outline:none;
    font-family:inherit;
}

#google-search:focus{
    box-shadow:0 0 20px var(--primary);
}

details{
    max-width:1200px;
    margin:20px auto;
}

summary{
    cursor:pointer;
    color:var(--primary);
    font-size:1.1rem;
    margin-bottom:20px;
    text-shadow:0 0 10px var(--primary);
}

/* Layout estilo grade de celular */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:20px 12px;
    margin-top:10px;
    justify-items:center;
}

/* Card estilo App de Celular */
.card{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    text-decoration:none;
    color:var(--text);
    width:85px;
    padding:10px 6px;
    background:var(--card);
    backdrop-filter:blur(10px);
    border-radius:16px;
    border:1px solid rgba(57,255,20,.2);
    transition:.25s ease;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:
        0 0 10px var(--primary),
        0 0 20px rgba(57,255,20,.4);
    border-color:var(--primary);
}

/* Ícone menor e proporcional */
.card img{
    width:32px;
    height:32px;
    margin-bottom:8px;
    object-fit:contain;
}

/* Nome pequeno embaixo */
.card span{
    font-size:0.65rem;
    word-break:break-word;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    line-height:1.2;
}

footer{
    text-align:center;
    margin-top:30px;
    opacity:.8;
    font-size:.8rem;
}
</style>
</head>
